<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaud devant family</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
          --warm-neutral: #F2EDE4;
          --pearl-white: #FFFFFFCC;
          --functional-black: #000000;
          --glass-bg: rgba(255, 255, 255, 0.4);
          --glass-border: rgba(255, 255, 255, 0.3);
          --glass-blur: blur(40px) saturate(120%);
          --glass-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
          --radius-container: 48px;
          --radius-pill: 100px;
          background-color: var(--warm-neutral);
        }
        body {
            margin: 0;
            padding: 0;
            color: var(--functional-black);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background:
              radial-gradient(circle at 20% 15%, rgba(255,255,255,0.55), rgba(255,255,255,0) 38%),
              radial-gradient(circle at 85% 30%, rgba(255,255,255,0.3), rgba(255,255,255,0) 45%),
              linear-gradient(145deg, #efe7d8 0%, #e7dfd0 45%, #d9d0bf 100%);
            background-attachment: fixed;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background-image: url('https://images.unsplash.com/photo-1470770841072-f978cf4d019e?q=80&w=1974&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            opacity: 0.22;
            filter: blur(2px) saturate(85%);
            transform: scale(1.02);
        }
        .font-cinzel { font-family: 'Cinzel', serif; }
        .glass-element {
          background: linear-gradient(135deg, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0.2) 100%);
          backdrop-filter: blur(25px);
          -webkit-backdrop-filter: blur(25px);
          border: 0.5px solid rgba(255,255,255,0.4);
          box-shadow: inset 0 0 15px rgba(255,255,255,0.1);
        }
        .glass-panel {
          background: var(--glass-bg);
          backdrop-filter: var(--glass-blur);
          -webkit-backdrop-filter: var(--glass-blur);
          border: 1px solid var(--glass-border);
          box-shadow: var(--glass-shadow);
          border-radius: var(--radius-container);
        }
        button, [role="button"] { border-radius: var(--radius-pill); }
        h1, h2, h3 {
          letter-spacing: -0.05em;
          text-transform: uppercase;
          font-weight: 900;
        }
        .meta-label {
          font-size: 10px;
          font-weight: 600;
          letter-spacing: 0.15em;
          text-transform: uppercase;
        }
        @keyframes spin-slow {
          from { transform: rotate(0deg); }
          to { transform: rotate(360deg); }
        }
        .animate-spin-slow { animation: spin-slow 12s linear infinite; }
        @keyframes twinkle {
          0%, 100% { opacity: 0.1; transform: scale(1); }
          50% { opacity: 0.3; transform: scale(1.2); }
        }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
